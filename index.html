<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM Courbe des Taux - Visualiseur</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #04080f; color: #dde8d8; font-family: sans-serif; }
        #root { min-height: 100vh; }
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #04080f; z-index: 1000;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left: 4px solid #00d28c;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box { background: #201010; border: 1px solid #ff5555; padding: 20px; border-radius: 8px; margin: 20px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Génération de l'interface...</p>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, 
            Tooltip, ResponsiveContainer, ReferenceLine 
        } = Recharts;

        window.storage = {
            get: (key) => {
                const val = localStorage.getItem(key);
                return Promise.resolve(val ? { value: val } : null);
            },
            set: (key, val) => { localStorage.setItem(key, val); return Promise.resolve(); }
        };

        async function init() {
            try {
                const response = await fetch('courbe-taux-MAD.jsx?v=' + Date.now());
                if (!response.ok) throw new Error("Fichier courbe-taux-MAD.jsx introuvable.");
                
                let code = await response.text();
                
                // Correction du remplacement pour éviter "function MainApp CourbeTauxMAD"
                code = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '');
                code = code.replace('export default function CourbeTauxMAD', 'function MainApp');
                
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    code = code.replace(/useState\("192\.168\.0\.187"\)/g, 'useState("localhost")');
                }

                const transformed = Babel.transform(code + "\n window.MainApp = MainApp;", { 
                    presets: ['react'] 
                }).code;

                eval(transformed);

                document.getElementById('loader').style.display = 'none';
                ReactDOM.createRoot(document.getElementById('root')).render(<window.MainApp />);

            } catch (err) {
                console.error(err);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('root').innerHTML = `<div class="error-box"><h3>Erreur</h3><pre style="white-space:pre-wrap">${err.message}</pre></div>`;
            }
        }
        init();
    </script>
</body>
</html>
